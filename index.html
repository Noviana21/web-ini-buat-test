<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track of the Day</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: background 0.5s ease, color 0.5s ease;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            /* background: linear-gradient(135deg, #0a0f1e 0%, #1a2b4c 100%); */
            color: #ffffff;
        }

        body.light-mode {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #2d3748;
        }

        .container {
            width: 90%;
            max-width: 420px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            transition: background 0.5s ease, box-shadow 0.5s ease;
        }

        body.light-mode .container {
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.8;
            font-weight: 400;
        }

        .album-cover-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 100%;
            margin-bottom: 30px;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .album-cover {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .album-cover.spinning {
            animation: spin 20s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        .track-info {
            text-align: center;
            margin-bottom: 30px;
        }

        .track-title {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .track-artist {
            font-size: 18px;
            opacity: 0.8;
            font-weight: 400;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
        }

        .play-button {
            width: 100%;
            padding: 18px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        body.light-mode .play-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.3);
        }

        .play-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }

        .play-button:active {
            transform: translateY(0);
        }

        .spotify-button {
            width: 100%;
            padding: 18px;
            font-size: 16px;
            font-weight: 600;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: transparent;
            color: inherit;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        body.light-mode .spotify-button {
            border-color: rgba(45, 55, 72, 0.2);
        }

        .spotify-button:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
        }

        body.light-mode .spotify-button:hover {
            background: rgba(45, 55, 72, 0.05);
            border-color: rgba(45, 55, 72, 0.3);
        }

        .theme-toggle {
            text-align: center;
        }

        .theme-button {
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.2);
            color: inherit;
        }

        body.light-mode .theme-button {
            background: rgba(45, 55, 72, 0.1);
        }

        .theme-button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        body.light-mode .theme-button:hover {
            background: rgba(45, 55, 72, 0.15);
        }

        .status {
            text-align: center;
            margin-bottom: 20px;
            font-size: 14px;
            opacity: 0.9;
            font-weight: 500;
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 25px;
            }

            .header h1 {
                font-size: 20px;
            }

            .track-title {
                font-size: 22px;
            }

            .track-artist {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Track of the Day</h1>
            <p>Featured Selection</p>
        </div>

        <div class="album-cover-wrapper">
            <img
                src="https://upload.wikimedia.org/wikipedia/en/0/04/Arctic_Monkeys_-_AM.png"
                alt="Album Cover"
                class="album-cover"
                id="albumCover"
            >
        </div>

        <div class="track-info">
            <div class="track-title">Fireside</div>
            <div class="track-artist">Arctic Monkeys</div>
        </div>

        <div class="status" id="status">Ready to play</div>

        <div class="controls">
            <button class="play-button" id="playButton">▶ Play</button>
            <a
                href="https://open.spotify.com/track/4atMrAadB7dS8xn9vfk9PQ?si=c66f6635aa584f07M"
                target="_blank"
                class="spotify-button"
            >
                🎵 Listen on Spotify
            </a>
        </div>

        <div class="theme-toggle">
            <button class="theme-button" id="themeButton">☀️ Light Mode</button>
        </div>
    </div>

    <script>
        const playButton = document.getElementById('playButton');
        const albumCover = document.getElementById('albumCover');
        const themeButton = document.getElementById('themeButton');
        const body = document.body;
        const status = document.getElementById('status');

        let isPlaying = false;

        playButton.addEventListener('click', function() {
            isPlaying = !isPlaying;

            if (isPlaying) {
                albumCover.classList.add('spinning');
                playButton.textContent = '⏸ Pause';
                status.textContent = 'Now playing...';
            } else {
                albumCover.classList.remove('spinning');
                playButton.textContent = '▶ Play';
                status.textContent = 'Paused';
            }
        });

        themeButton.addEventListener('click', function() {
            body.classList.toggle('light-mode');

            if (body.classList.contains('light-mode')) {
                themeButton.textContent = '🌙 Dark Mode';
            } else {
                themeButton.textContent = '☀️ Light Mode';
            }
        });

        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') {
            body.classList.add('light-mode');
            themeButton.textContent = '🌙 Dark Mode';
        }

        themeButton.addEventListener('click', function() {
            if (body.classList.contains('light-mode')) {
                localStorage.setItem('theme', 'light');
            } else {
                localStorage.setItem('theme', 'dark');
            }
        });
    </script>
</body>
</html>
